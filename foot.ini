[main]
font=JetBrains Mono:size=13
pad=12x12

[cursor]
style=block
blink=yes

[colors]
# Průhlednost pozadí (0.0 - 1.0)
alpha=0.9
background=0f0f0f
foreground=d1d1d1

## Armored Core VI Palette
regular0=0f0f0f  # black
regular1=ff4500  # red (Rubicon)
regular2=00ff00  # green
regular3=ffff00  # yellow
regular4=00ffff  # blue (Cyan)
regular5=ff00ff  # magenta
regular6=00ffff  # cyan
regular7=d1d1d1  # white

[mouse]
hide-when-typing=yes

[csd]
# Skrytí dekorací okna (Sway si je řeší sám)
size=0
